<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cárnicos Gustavo · Sistema de Diseño</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Archivo', system-ui, sans-serif; background: #ECE5D8; color: #211C19;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  #root { min-height: 100vh; }
  button { font-family: inherit; }
  input { font-family: inherit; }
  input::placeholder { color: #9A9087; }
  a { -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { width: 10px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(120,110,98,0.35); border-radius: 999px; }
  .cg-btn { transition: filter .15s ease, transform .05s ease; }
  .cg-btn:hover { filter: brightness(0.94); }
  .cg-btn:active { transform: translateY(1px); }
  @media (max-width: 760px) {
    .cg-ds-nav { display: none !important; }
    .cg-ds-grid { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>

<script type="text/babel" src="cg-data.jsx"></script>
<script type="text/babel" src="cg-ui.jsx"></script>
<script type="text/babel" src="cg-antonella.jsx"></script>
<script type="text/babel" src="cg-ai-kit.jsx"></script>
<script type="text/babel" src="cg-designsystem.jsx"></script>
<script type="text/babel">
  // Página independiente del Sistema de Diseño (misma fuente que el módulo dentro de la app)
  window.CG.applyTheme(localStorage.getItem("cg_palette")||"warm", localStorage.getItem("cg_mode")||"light");
  document.body.style.background = window.CG.color.bg;
  const ai = { chip(){}, open(){} };
  const Root = () => (
    <div style={{ maxWidth: 1180, margin: "0 auto", padding: "26px clamp(16px,3vw,34px) 80px" }}>
      <DesignSystemScreen ai={ai} />
    </div>
  );
  ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
